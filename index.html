<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>chats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <div class="header">
    <img id="dp" class="dp" src="" alt="">
    <span id="chat-name"></span>

    <div class="header-actions">
      <button id="menu-btn" class="icon-btn" aria-label="More options">⋮</button>
      <div id="header-menu" class="header-menu hidden">
        <button id="menu-search" type="button">Search</button>
        <button id="menu-switch" type="button">Switch chat</button>
      </div>
    </div>
  </div>

  <div class="viewer-select hidden" aria-hidden="true">
    <select id="viewer">
      <option value="Mehul">Mehul</option>
      <option value="Dimp">Dimple</option>
    </select>
  </div>

  <div class="search-box hidden" id="search-box">
    <input type="text" id="search" placeholder="Search...">
    <div class="search-nav">
      <button id="search-up" class="icon-btn" aria-label="Previous result">˄</button>
      <button id="search-down" class="icon-btn" aria-label="Next result">˅</button>
      <button id="search-close" class="icon-btn" aria-label="Close search">×</button>
    </div>
  </div>

  <div id="floating-date"></div>

  <div id="chat-container"></div>

  <button id="scroll-bottom" aria-label="Scroll to latest">▾</button>

  <div id="viewer-picker" class="viewer-picker hidden" role="dialog" aria-modal="true" aria-label="Choose chat">
    <div class="viewer-card">
      <h3>Select chat</h3>
      <p>Choose which side you want to view as.</p>
      <div class="viewer-options">
        <button type="button" class="viewer-option" data-viewer="Mehul">Mehul</button>
        <button type="button" class="viewer-option" data-viewer="Dimp">Dimple</button>
      </div>
    </div>
  </div>
<div class="input-box">
  <input id="msg-input" placeholder="Type message...">
  <button id="send-btn">Send</button>
</div>
</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
