<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>chats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <div class="header">
    <img id="dp" class="dp" src="" alt="">
    <span id="chat-name"></span>

    <div class="header-actions">
      <button id="menu-btn" class="icon-btn" aria-label="More options">⋮</button>
      <div id="header-menu" class="header-menu hidden">
        <button id="menu-search" type="button">Search</button>
        <button id="menu-media" type="button">Media</button>
        <button id="menu-switch" type="button">Switch chat</button>
      </div>
    </div>
  </div>

  <div class="viewer-select hidden" aria-hidden="true">
    <select id="viewer">
      <option value="Mehul">Mehul</option>
      <option value="Dimp">Dimple</option>
    </select>
  </div>

  <div class="search-box hidden" id="search-box">
    <input type="text" id="search" placeholder="Search...">
    <div class="search-nav">
      <button id="search-up" class="icon-btn" aria-label="Previous result">˄</button>
      <button id="search-down" class="icon-btn" aria-label="Next result">˅</button>
      <button id="search-close" class="icon-btn" aria-label="Close search">×</button>
    </div>
  </div>

  <div id="floating-date"></div>

  <div id="chat-container"></div>

  <button id="scroll-bottom" aria-label="Scroll to latest">▾</button>

  <div id="media-panel" class="media-panel hidden" role="dialog" aria-modal="true" aria-label="Chat media">
    <div class="media-sheet">
      <div class="media-head">
        <h3>Media</h3>
        <button id="media-close" class="icon-btn" type="button" aria-label="Close media panel">×</button>
      </div>
      <div class="media-filters">
        <button id="media-tab-photos" class="media-tab active" type="button" data-type="image">Photos</button>
        <button id="media-tab-videos" class="media-tab" type="button" data-type="video">Videos</button>
        <button id="media-tab-stickers" class="media-tab" type="button" data-type="sticker">Stickers</button>
      </div>
      <div id="media-list" class="media-list"></div>
    </div>
  </div>

  <div id="viewer-picker" class="viewer-picker hidden" role="dialog" aria-modal="true" aria-label="Choose chat">
    <div class="viewer-card">
      <h3>Select chat</h3>
      <p>Choose which side you want to view as.</p>
      <div class="viewer-options">
        <button type="button" class="viewer-option" data-viewer="Mehul">Mehul</button>
        <button type="button" class="viewer-option" data-viewer="Dimp">Dimple</button>
      </div>
    </div>
  </div>
<div class="input-box">
  <button id="attach-btn" class="icon-btn" aria-label="Open sticker and file options">＋</button>
  <div class="composer">
    <input id="msg-input" placeholder="Message">
  </div>
  <button id="send-btn" aria-label="Send message">➤</button>
</div>

<div id="attach-menu" class="attach-menu hidden">
  <button id="attach-sticker" type="button">Sticker (STK*.webp)</button>
  <button id="attach-file" type="button">Send STK file</button>
</div>
<input id="sticker-file-input" class="hidden" type="file" accept=".webp">

<div id="sticker-panel" class="media-panel hidden" role="dialog" aria-modal="true" aria-label="Choose sticker">
  <div class="media-sheet">
    <div class="media-head">
      <h3>Stickers</h3>
      <button id="sticker-close" class="icon-btn" type="button" aria-label="Close sticker panel">×</button>
    </div>
    <div id="sticker-list" class="media-list"></div>
  </div>
</div>
</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
