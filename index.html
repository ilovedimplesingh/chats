<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>chats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <!-- 🔝 HEADER -->
  <div class="header">
    <img id="dp" class="dp" src="" alt="">
    <span id="chat-name"></span>

    <div class="header-actions">
      <button id="menu-btn" class="icon-btn" aria-label="More options">⋮</button>
      <div id="header-menu" class="header-menu hidden">
        <button id="menu-search" type="button">Search</button>
      </div>
    </div>
  </div>

  <div class="viewer-select">
    <select id="viewer">
      <option value="Mehul">Mehul</option>
      <option value="Dimp">Dimp</option>
    </select>
  </div>

  <div class="search-box hidden" id="search-box">
    <input type="text" id="search" placeholder="Search...">
    <div class="search-nav">
      <button id="search-up" class="icon-btn" aria-label="Previous result">⬆️</button>
      <button id="search-down" class="icon-btn" aria-label="Next result">⬇️</button>
      <button id="search-close" class="icon-btn" aria-label="Close search">✕</button>
    </div>
  </div>

  <div id="floating-date"></div>

  <div id="chat-container"></div>

  <button id="scroll-bottom">⬇️</button>

</div>

<script src="script.js"></script>

</body>
</html>
